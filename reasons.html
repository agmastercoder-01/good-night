<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Why I Love You 💜 — AG & Rupsha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Pacifico&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#1a0a1e;}
body{font-family:'Nunito',sans-serif;overflow-x:hidden;}

.starbg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:.9;transform:scale(1.5);}}

.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% 25%,rgba(212,83,126,.3) 0%,transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 10%,rgba(138,43,226,.28) 0%,transparent 70%),
    radial-gradient(ellipse 60% 35% at 50% 90%,rgba(232,168,32,.15) 0%,transparent 70%);}

.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(26,10,30,.6);backdrop-filter:blur(10px);}
.logo{font-family:'Pacifico',cursive;font-size:20px;text-decoration:none;
  background:linear-gradient(90deg,#f7c766,#D4537E,#b57bee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-pills{display:flex;gap:8px;flex-wrap:wrap;}
.np{font-size:11px;font-weight:800;letter-spacing:.5px;padding:6px 14px;border-radius:20px;
  cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);
  background:rgba(255,255,255,.07);transition:all .2s;text-decoration:none;display:inline-block;}
.np:hover,.np.active{background:rgba(212,83,126,.4);border-color:#D4537E;color:white;}

/* ── PAGE HERO ── */
.page-hero{position:relative;z-index:5;text-align:center;padding:44px 20px 30px;}
.hero-tag{display:inline-block;border:1.5px solid rgba(247,199,102,.4);color:#f7c766;
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:5px 20px;border-radius:30px;margin-bottom:16px;background:rgba(247,199,102,.07);}
.hero-title{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;font-style:italic;
  color:white;line-height:1.1;margin-bottom:10px;text-shadow:0 0 50px rgba(212,83,126,.45);}
.hero-title span{background:linear-gradient(90deg,#f7c766,#ffb3d1,#f7c766);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{color:rgba(255,255,255,.4);font-size:13px;font-weight:700;font-style:italic;letter-spacing:.5px;}

/* ── MESSAGE STAGE ── */
.stage{position:relative;z-index:5;margin:0 28px 40px;min-height:340px;
  background:linear-gradient(145deg,rgba(30,9,38,.9),rgba(21,6,32,.95));
  border:1px solid rgba(212,83,126,.2);border-radius:28px;
  padding:36px 36px 100px;overflow:hidden;}
.stage::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#b57bee,#D4537E,#f7c766,#D4537E,#b57bee,transparent);}
.stage::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#f7c766,#D4537E,#b57bee,#D4537E,#f7c766,transparent);}

/* animated scanline */
.scanline{position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(212,83,126,.6),transparent);
  animation:scan 3s linear infinite;pointer-events:none;z-index:2;}
@keyframes scan{0%{top:0%;}100%{top:100%;}}

.msg-container{position:relative;z-index:3;}

/* each word animates in */
.word{
  display:inline-block;
  opacity:0;
  transform:translateY(18px) scale(.85);
  transition:opacity .35s ease, transform .35s cubic-bezier(.34,1.4,.64,1);
  margin-right:5px;
}
.word.visible{opacity:1;transform:translateY(0) scale(1);}

.msg-text{
  font-family:'Playfair Display',serif;
  font-size:22px;font-style:italic;
  color:white;line-height:1.9;
  text-align:center;
}
.w-gold{color:#f7c766;font-weight:700;font-style:normal;}
.w-pink{color:#ffb3d1;}
.w-purple{color:#c4a0f5;}
.w-big{font-size:28px;color:#ff85b0;font-weight:700;font-style:normal;}

/* blinking cursor */
.cursor{display:inline-block;width:3px;height:24px;background:#D4537E;
  vertical-align:middle;margin-left:4px;
  animation:blink .7s step-end infinite;border-radius:2px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* start button */
.start-btn{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#D4537E,#b57bee);
  color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  padding:12px 32px;border-radius:24px;border:none;cursor:pointer;
  letter-spacing:.5px;z-index:5;transition:all .25s;
  animation:startPulse 1.5s ease-in-out infinite;
}
.start-btn:hover{transform:translateX(-50%) translateY(-2px) scale(1.05);filter:brightness(1.1);}
@keyframes startPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,83,126,.5);}
  50%{box-shadow:0 0 0 10px rgba(212,83,126,0);}}
.start-btn.hidden{display:none;}

/* ── GOT IT POPUP ── */
.gotit-overlay{
  position:fixed;inset:0;z-index:900;
  display:flex;align-items:center;justify-content:center;
  background:rgba(5,0,14,.0);pointer-events:none;
  transition:background .5s ease;
}
.gotit-overlay.open{background:rgba(5,0,14,.88);pointer-events:all;}

.gotit-box{
  position:relative;
  width:min(480px,88vw);
  background:linear-gradient(145deg,#1e0926,#150620,#1a0a1e);
  border-radius:30px;
  padding:44px 36px 36px;
  text-align:center;
  border:1px solid rgba(212,83,126,.3);
  transform:scale(.4) rotate(-6deg);opacity:0;
  transition:transform .65s cubic-bezier(.34,1.56,.64,1),opacity .45s ease;
  overflow:hidden;
}
.gotit-overlay.open .gotit-box{transform:scale(1) rotate(0deg);opacity:1;}
.gotit-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#b57bee,#D4537E,#f7c766,#D4537E,#b57bee);}

.close-x{
  position:absolute;top:14px;right:16px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:'Nunito',sans-serif;font-weight:800;
}
.close-x:hover{background:rgba(212,83,126,.35);color:white;border-color:#D4537E;
  transform:rotate(90deg) scale(1.1);}

.gotit-emoji{font-size:52px;display:block;margin-bottom:16px;
  animation:wiggle .5s ease-in-out infinite alternate;}
@keyframes wiggle{0%{transform:rotate(-8deg) scale(1);}100%{transform:rotate(8deg) scale(1.1);}}

.gotit-title{
  font-family:'Playfair Display',serif;
  font-size:38px;font-weight:700;font-style:italic;
  background:linear-gradient(90deg,#f7c766,#ffb3d1,#b57bee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;line-height:1.1;
}
.gotit-sub{font-size:14px;color:rgba(255,255,255,.55);font-weight:700;
  font-style:italic;line-height:1.6;margin-bottom:24px;}
.gotit-sub span{color:#ffb3d1;}

.gotit-btn{
  display:inline-block;
  background:linear-gradient(135deg,#f7c766,#D4537E,#b57bee);
  color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  padding:12px 32px;border-radius:24px;border:none;cursor:pointer;
  letter-spacing:.5px;transition:all .25s;
}
.gotit-btn:hover{transform:translateY(-2px) scale(1.05);filter:brightness(1.1);}

/* confetti burst inside gotit */
.conf{position:absolute;pointer-events:none;border-radius:2px;
  animation:confFall linear forwards;}
@keyframes confFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1;}
  100%{transform:translateY(300px) rotate(720deg);opacity:0;}
}

/* sparkle */
.sparkle{position:fixed;pointer-events:none;z-index:600;border-radius:50%;
  animation:spk ease-out forwards;}
@keyframes spk{0%{transform:scale(0);opacity:1;}100%{transform:scale(2.5);opacity:0;}}

/* floating hearts */
.fh{position:absolute;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0;}10%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(-110vh) rotate(25deg);opacity:0;}}

.from-tag{position:relative;z-index:5;text-align:center;padding:0 0 36px;
  font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,#f7c766,#D4537E,#b57bee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

@media(max-width:600px){
  .hero-title{font-size:32px;}
  .stage{margin:0 14px 30px;padding:28px 20px 90px;}
  .msg-text{font-size:17px;}
  .w-big{font-size:22px;}
  .gotit-title{font-size:28px;}
  .topbar{padding:12px 16px;}
}

.enjoy-text{
  font-family:'Pacifico',cursive;
  font-size:15px;
  letter-spacing:3px;
  background:linear-gradient(90deg,#f7c766,#ff85b0,#b57bee,#f7c766);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:enjoyShift 2.5s linear infinite, enjoyGlow 1.2s ease-in-out infinite alternate;
}
@keyframes enjoyShift{0%{background-position:0%;}100%{background-position:300%;}}
@keyframes enjoyGlow{0%{filter:drop-shadow(0 0 4px rgba(212,83,126,.5));}100%{filter:drop-shadow(0 0 16px rgba(247,199,102,.9));}}
.return-btn{
  font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:800;letter-spacing:.5px;
  padding:7px 16px;border-radius:20px;
  border:1.5px solid rgba(212,83,126,.45);
  color:#ffb3d1;
  background:rgba(212,83,126,.1);
  text-decoration:none;
  transition:all .2s;
  white-space:nowrap;
}
.return-btn:hover{background:rgba(212,83,126,.35);color:white;border-color:#D4537E;transform:translateX(-2px);}
</style>
</head>
<body>

<!-- GOT IT POPUP -->
<div class="gotit-overlay" id="gotitOverlay">
  <div class="gotit-box" id="gotitBox">
    <button class="close-x" onclick="closeGotit()">✕</button>
    <span class="gotit-emoji">🦇</span>
    <div class="gotit-title">GOT IT?????!!!!</div>
    <div class="gotit-sub">
      You are <span>Rupsha Das</span> — AG's Rupsha Das.<br>
      That alone is literally everything. 💜<br>
      <span>No reason needed. Ever.</span>
    </div>
    <button class="gotit-btn" onclick="closeGotit()">Yes I got it 💖</button>
  </div>
</div>

<script>
/* ── stars ── */
const sb=document.getElementById('starbg');
for(let i=0;i<90;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*6}s;`;
  sb.appendChild(s);
}

/* ── floating hearts ── */
const fh=document.getElementById('fhearts');
const hSyms=['♥','❤','💕','💖','💗','🌸','🦇','💜'];
for(let i=0;i<18;i++){
  const el=document.createElement('span');el.className='fh';
  el.textContent=hSyms[i%hSyms.length];
  el.style.left=Math.random()*100+'%';
  el.style.bottom='-40px';
  el.style.animationDuration=(5+Math.random()*7)+'s';
  el.style.animationDelay=(Math.random()*10)+'s';
  el.style.fontSize=(12+Math.random()*14)+'px';
  el.style.color=['#D4537E','#f7c766','#b57bee','#ffb3d1','#ED93B1'][i%5];
  fh.appendChild(el);
}

/* ── sparkles ── */
const spC=['#D4537E','#f7c766','#b57bee','#ffb3d1','#5DCAA5'];
document.addEventListener('click',function(e){
  if(e.target.closest('.gotit-overlay'))return;
  for(let i=0;i<5;i++){
    const sp=document.createElement('div');sp.className='sparkle';
    const sz=3+Math.random()*5;
    sp.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX+(-20+Math.random()*40)}px;top:${e.clientY+(-20+Math.random()*40)}px;background:${spC[i%5]};animation-duration:${.5+Math.random()*.4}s;`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),900);
  }
});

/* ── ANIMATED MESSAGE ── */
const segments=[
  {text:'ARE U',cls:'w-big'},
  {text:'FUCKING',cls:'w-gold'},
  {text:'MADD',cls:'w-big'},
  {text:'!!???',cls:'w-pink'},
  {text:'Toke',cls:''},
  {text:'bhalobashaar',cls:'w-pink'},
  {text:'reasons',cls:''},
  {text:'lagbe',cls:''},
  {text:'abar',cls:''},
  {text:'amar',cls:'w-purple'},
  {text:'jonno???',cls:'w-gold'},
  {text:'\n',cls:'br'},

  {text:'janto',cls:'w-pink'},
  {text:'asto',cls:'w-pink'},
  {text:'manush...',cls:''},
  {text:'\n',cls:'br'},
  {text:'Tui',cls:''},
  {text:'akta',cls:''},
  {text:'🌸',cls:'w-big'},
  {text:'RUPSHA',cls:'w-gold'},
  {text:'DAS',cls:'w-gold'},
  {text:'🌸',cls:'w-big'},
  {text:'\n',cls:'br'},
  {text:'OFC',cls:'w-purple'},
  {text:"amar'r",cls:''},
  {text:'wala',cls:'w-pink'},
  {text:'Rupsha',cls:'w-gold'},
  {text:'Das —',cls:''},
  {text:'\n',cls:'br'},
  {text:"that's",cls:''},
  {text:'ENOUGH',cls:'w-big'},
  {text:'for me to',cls:''},
  {text:'LOVE',cls:'w-gold'},
  {text:'YOU!!!',cls:'w-big'},
  {text:'💖',cls:'w-big'},

  {text:'Keu',cls:''},

  {text:'kichu',cls:''},

  {text:'\n',cls:'br'},

  {text:'you are',cls:''},

  {text:'✨',cls:'w-big'},
  {text:'\n',cls:'br'},

  {text:'Haa',cls:'w-pink'},
  {text:'ebr',cls:''},
  {text:'jodi',cls:''},
  {text:'ami',cls:'w-purple'},
  {text:'bolii',cls:''},

  {text:'\n',cls:'br'},
  {text:'karon',cls:''},
  {text:'ami-o',cls:'w-gold'},
  {text:'toh',cls:''},
  {text:'BEST',cls:'w-big'},
  {text:'LOL',cls:'w-big'},
  {text:'🤣🤣🤣',cls:'w-big'},
];

let animRunning=false;

function startAnim(){
  if(animRunning)return;
  animRunning=true;
  document.getElementById('startBtn').classList.add('hidden');

  const container=document.getElementById('msgText');
  container.innerHTML='';
  const cursor=document.createElement('span');
  cursor.className='cursor';
  cursor.id='cursor';

  let i=0;
  const els=[];

  segments.forEach(seg=>{
    if(seg.cls==='br'){
      const br=document.createElement('br');
      container.appendChild(br);
    } else {
      const span=document.createElement('span');
      span.className='word'+(seg.cls?' '+seg.cls:'');
      span.textContent=seg.text+' ';
      container.appendChild(span);
      els.push(span);
    }
  });
  container.appendChild(cursor);

  function revealNext(){
    if(i<els.length){
      els[i].classList.add('visible');
      i++;
      /* vary speed for dramatic effect */
      const delay = els[i-1]&&els[i-1].classList.contains('w-big') ? 120 : 70;
      setTimeout(revealNext, delay+(Math.random()*60));
    } else {
      /* remove cursor, show gotit popup */
      cursor.remove();
      setTimeout(showGotit, 900);
    }
  }
  setTimeout(revealNext,400);
}

/* ── GOT IT POPUP ── */
function showGotit(){
  const ov=document.getElementById('gotitOverlay');
  ov.classList.add('open');
  burstConfetti();
}

function closeGotit(){
  document.getElementById('gotitOverlay').classList.remove('open');
}

function burstConfetti(){
  const box=document.getElementById('gotitBox');
  const cols=['#f7c766','#D4537E','#b57bee','#ffb3d1','#5DCAA5','#ff6eb4','#fff'];
  for(let i=0;i<38;i++){
    const c=document.createElement('div');
    c.className='conf';
    const w=5+Math.random()*8, h=5+Math.random()*12;
    c.style.cssText=`width:${w}px;height:${h}px;left:${Math.random()*100}%;top:-10px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${1.2+Math.random()*1.2}s;
      animation-delay:${Math.random()*.4}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};`;
    box.appendChild(c);
    setTimeout(()=>c.remove(),2600);
  }
}

document.getElementById('gotitOverlay').addEventListener('click',function(e){
  if(e.target===this)closeGotit();
});
